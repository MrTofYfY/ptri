<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoVault - Кошелёк</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            min-height: 100vh;
            color: #fff;
        }

        .app-container {
            max-width: 420px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            background: linear-gradient(180deg, #1a1a2e 0%, #0d0d1a 100%);
        }

        /* Auth Screens */
        .auth-screen {
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .auth-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #8b5cf6 0%, #a855f7 50%, #c084fc 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .auth-logo i {
            font-size: 36px;
            color: #fff;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-subtitle {
            color: #8b8b9e;
            margin-bottom: 40px;
        }

        .auth-form {
            width: 100%;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            color: #8b8b9e;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 16px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 16px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-group select option {
            background: #1a1a2e;
            color: #fff;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }

        .input-group input::placeholder {
            color: #6b6b7e;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b5cf6 0%, #a855f7 100%);
            color: #fff;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(139, 92, 246, 0.5);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(139, 92, 246, 0.1);
            color: #a855f7;
            border: 1px solid rgba(139, 92, 246, 0.3);
            margin-top: 12px;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: #fff;
        }

        /* Main Wallet Screen */
        .wallet-screen {
            display: none;
            padding-bottom: 100px;
        }

        .wallet-header {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #8b5cf6 0%, #a855f7 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-name {
            font-weight: 600;
        }

        .admin-badge {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 10px;
            margin-left: 8px;
        }

        .currency-switch {
            display: flex;
            background: rgba(139, 92, 246, 0.1);
            border-radius: 12px;
            padding: 4px;
        }

        .currency-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: #8b8b9e;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .currency-btn.active {
            background: linear-gradient(135deg, #8b5cf6 0%, #a855f7 100%);
            color: #fff;
        }

        .balance-card {
            margin: 20px 24px;
            padding: 32px;
            background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 50%, #5b21b6 100%);
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 8px 40px rgba(139, 92, 246, 0.4);
            position: relative;
            overflow: hidden;
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
        }

        .balance-label {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .balance-amount {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }

        .balance-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 16px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .action-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .action-btn i {
            font-size: 20px;
        }

        .action-btn span {
            font-size: 12px;
            font-weight: 500;
        }

        /* Admin/User Button */
        .special-btn {
            margin: 0 24px 20px;
            display: flex;
            gap: 12px;
        }

        .special-btn button {
            flex: 1;
            padding: 16px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .create-coin-btn {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            border: none;
            color: #fff;
            box-shadow: 0 4px 20px rgba(245, 158, 11, 0.4);
        }

        .market-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            color: #fff;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
        }

        /* Crypto List */
        .section-title {
            padding: 0 24px;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .crypto-list {
            padding: 0 24px;
        }

        .crypto-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: rgba(139, 92, 246, 0.08);
            border-radius: 16px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .crypto-item:hover {
            background: rgba(139, 92, 246, 0.15);
            transform: translateX(4px);
        }

        .crypto-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            margin-right: 16px;
            object-fit: cover;
            background: #2a2a4a;
        }

        .crypto-info {
            flex: 1;
        }

        .crypto-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .crypto-ticker {
            color: #8b8b9e;
            font-size: 13px;
        }

        .crypto-price {
            text-align: right;
        }

        .crypto-price-value {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .crypto-change {
            font-size: 13px;
        }

        .crypto-change.positive {
            color: #10b981;
        }

        .crypto-change.negative {
            color: #ef4444;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #0d0d1a 100%);
            border-radius: 24px;
            padding: 32px;
            width: 90%;
            max-width: 380px;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: modalSlide 0.3s ease;
        }

        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: #8b8b9e;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: #fff;
        }

        /* Processing Loader */
        .processing-modal {
            text-align: center;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(139, 92, 246, 0.2);
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Market Modal */
        .market-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: rgba(139, 92, 246, 0.08);
            border-radius: 16px;
            margin-bottom: 12px;
        }

        .market-actions {
            display: flex;
            gap: 8px;
        }

        .market-actions button {
            padding: 8px 16px;
            border: none;
            border-radius: 10px;
            font-weight: 500;
            cursor: pointer;
            font-size: 13px;
            transition: transform 0.2s ease;
        }

        .market-actions button:hover {
            transform: scale(1.05);
        }

        .buy-btn {
            background: #10b981;
            color: #fff;
        }

        .sell-btn {
            background: #ef4444;
            color: #fff;
        }

        .take-all-btn {
            width: 100%;
            margin-top: 20px;
            padding: 16px;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 420px;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            padding: 16px 24px;
            display: flex;
            justify-content: space-around;
            border-top: 1px solid rgba(139, 92, 246, 0.2);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #8b8b9e;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-item.active, .nav-item:hover {
            color: #a855f7;
        }

        .nav-item i {
            font-size: 22px;
        }

        .nav-item span {
            font-size: 11px;
        }

        .exchange-rate {
            background: rgba(139, 92, 246, 0.1);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            color: #c084fc;
            font-size: 14px;
        }

        .hidden {
            display: none !important;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #8b8b9e;
            cursor: pointer;
            font-size: 20px;
            transition: color 0.3s ease;
        }

        .logout-btn:hover {
            color: #ef4444;
        }

        .holding-amount {
            color: #a855f7;
            font-size: 13px;
        }

        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
        }

        .success-msg {
            color: #10b981;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
        }

        .no-coins-msg {
            text-align: center;
            color: #8b8b9e;
            padding: 40px 20px;
        }

        .no-coins-msg i {
            font-size: 48px;
            margin-bottom: 16px;
            color: #4a4a6a;
        }

        .refresh-btn {
            background: rgba(139, 92, 246, 0.2);
            border: none;
            color: #a855f7;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            margin-top: 12px;
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #1a1a2e 0%, #0d0d1a 100%);
            border: 1px solid rgba(139, 92, 246, 0.5);
            padding: 16px 24px;
            border-radius: 16px;
            z-index: 2000;
            display: none;
            animation: toastSlide 0.3s ease;
            max-width: 350px;
            text-align: center;
        }

        .toast.success {
            border-color: #10b981;
        }

        .toast.error {
            border-color: #ef4444;
        }

        @keyframes toastSlide {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Auth Screen -->
        <div class="auth-screen" id="authScreen">
            <div class="auth-logo">
                <i class="fas fa-wallet"></i>
            </div>
            <h1 class="auth-title">CryptoVault</h1>
            <p class="auth-subtitle">Безопасный криптокошелёк</p>
            
            <div class="auth-form" id="loginForm">
                <div class="input-group">
                    <label>Логин</label>
                    <input type="text" id="loginUsername" placeholder="Введите логин">
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" placeholder="Введите пароль">
                </div>
                <div id="loginError" class="error-msg hidden"></div>
                <button class="btn btn-primary" onclick="login()" id="loginBtn">Войти</button>
                <button class="btn btn-secondary" onclick="showRegister()">Создать кошелёк</button>
            </div>

            <div class="auth-form hidden" id="registerForm">
                <div class="input-group">
                    <label>Логин</label>
                    <input type="text" id="regUsername" placeholder="Придумайте логин">
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" placeholder="Придумайте пароль">
                </div>
                <div class="input-group">
                    <label>Основная валюта</label>
                    <select id="regCurrency">
                        <option value="USD">$ Доллары</option>
                        <option value="RUB">₽ Рубли</option>
                    </select>
                </div>
                <div id="regError" class="error-msg hidden"></div>
                <button class="btn btn-primary" onclick="register()" id="regBtn">Создать кошелёк</button>
                <button class="btn btn-secondary" onclick="showLogin()">Уже есть аккаунт</button>
            </div>
        </div>

        <!-- Wallet Screen -->
        <div class="wallet-screen" id="walletScreen">
            <div class="wallet-header">
                <div class="user-info">
                    <div class="user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <span class="user-name" id="userName">Username</span>
                    <span class="admin-badge hidden" id="adminBadge">ADMIN</span>
                </div>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="currency-switch">
                        <button class="currency-btn active" data-currency="USD" onclick="switchCurrency('USD')">$</button>
                        <button class="currency-btn" data-currency="RUB" onclick="switchCurrency('RUB')">₽</button>
                    </div>
                    <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>

            <div class="balance-card">
                <div class="balance-label">Общий баланс</div>
                <div class="balance-amount" id="balanceAmount">$0.00</div>
                <div class="balance-actions">
                    <button class="action-btn" onclick="showDepositModal()">
                        <i class="fas fa-plus"></i>
                        <span>Пополнить</span>
                    </button>
                    <button class="action-btn" onclick="showExchangeModal()">
                        <i class="fas fa-exchange-alt"></i>
                        <span>Обменять</span>
                    </button>
                    <button class="action-btn" onclick="showSendModal()">
                        <i class="fas fa-paper-plane"></i>
                        <span>Отправить</span>
                    </button>
                </div>
            </div>

            <div class="special-btn">
                <button class="create-coin-btn hidden" id="createCoinBtn" onclick="showCreateCoinModal()">
                    <i class="fas fa-coins"></i>
                    Создать Коин
                </button>
                <button class="market-btn" id="marketBtn" onclick="showMarketModal()">
                    <i class="fas fa-store"></i>
                    КриптоМаркет
                </button>
            </div>

            <div class="section-title">Мои активы</div>
            <div class="crypto-list" id="myHoldings">
                <!-- Holdings will be rendered here -->
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav hidden" id="bottomNav">
            <div class="nav-item active">
                <i class="fas fa-wallet"></i>
                <span>Кошелёк</span>
            </div>
            <div class="nav-item" onclick="showMarketModal()">
                <i class="fas fa-chart-line"></i>
                <span>Рынок</span>
            </div>
            <div class="nav-item" onclick="showExchangeModal()">
                <i class="fas fa-sync-alt"></i>
                <span>Обмен</span>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Deposit Modal -->
    <div class="modal-overlay" id="depositModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Пополнить баланс</h3>
                <button class="modal-close" onclick="closeModal('depositModal')">&times;</button>
            </div>
            <div class="input-group">
                <label>Номер карты</label>
                <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19" oninput="formatCardNumber(this)">
            </div>
            <div class="input-group">
                <label>Сумма (<span id="depositCurrency">$</span>)</label>
                <input type="number" id="depositAmount" placeholder="Введите сумму">
            </div>
            <button class="btn btn-primary" onclick="processDeposit()">Пополнить</button>
        </div>
    </div>

    <!-- Processing Modal -->
    <div class="modal-overlay" id="processingModal">
        <div class="modal processing-modal">
            <div class="loader"></div>
            <h3>Обработка платежа...</h3>
            <p style="color: #8b8b9e; margin-top: 10px;">Пожалуйста, подождите</p>
        </div>
    </div>

    <!-- Exchange Modal -->
    <div class="modal-overlay" id="exchangeModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Обмен валюты</h3>
                <button class="modal-close" onclick="closeModal('exchangeModal')">&times;</button>
            </div>
            <div class="exchange-rate" id="exchangeRateDisplay">
                Курс: 1 USD = <span id="currentRate">92.50</span> RUB
            </div>
            <div class="input-group">
                <label>Из валюты</label>
                <select id="fromCurrency" onchange="updateExchangePreview()">
                    <option value="USD">$ Доллары</option>
                    <option value="RUB">₽ Рубли</option>
                </select>
            </div>
            <div class="input-group">
                <label>Сумма</label>
                <input type="number" id="exchangeAmount" placeholder="Введите сумму" oninput="updateExchangePreview()">
            </div>
            <div class="input-group">
                <label>Вы получите</label>
                <input type="text" id="exchangeResult" readonly style="background: rgba(139, 92, 246, 0.05);">
            </div>
            <button class="btn btn-primary" onclick="processExchange()">Обменять</button>
        </div>
    </div>

    <!-- Create Coin Modal (Admin Only) -->
    <div class="modal-overlay" id="createCoinModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Создать Коин</h3>
                <button class="modal-close" onclick="closeModal('createCoinModal')">&times;</button>
            </div>
            <div class="input-group">
                <label>Название</label>
                <input type="text" id="coinName" placeholder="Bitcoin">
            </div>
            <div class="input-group">
                <label>Тикер</label>
                <input type="text" id="coinTicker" placeholder="BTC" maxlength="5" style="text-transform: uppercase;">
            </div>
            <div class="input-group">
                <label>Описание</label>
                <input type="text" id="coinDescription" placeholder="Краткое описание">
            </div>
            <div class="input-group">
                <label>URL иконки</label>
                <input type="text" id="coinIcon" placeholder="https://...">
            </div>
            <div class="input-group">
                <label>Стартовая цена ($)</label>
                <input type="number" id="coinPrice" placeholder="1.00" step="0.01">
            </div>
            <button class="btn btn-primary" onclick="createCoin()">Создать</button>
        </div>
    </div>

    <!-- Market Modal -->
    <div class="modal-overlay" id="marketModal">
        <div class="modal" style="max-height: 80vh;">
            <div class="modal-header">
                <h3 class="modal-title">КриптоМаркет</h3>
                <button class="modal-close" onclick="closeModal('marketModal')">&times;</button>
            </div>
            <div id="marketList">
                <!-- Market items will be rendered here -->
            </div>
            <button class="take-all-btn hidden" id="takeAllBtn" onclick="takeAllCapitalization()">
                <i class="fas fa-hand-holding-usd"></i>
                Забрать всё
            </button>
        </div>
    </div>

    <!-- Buy/Sell Modal -->
    <div class="modal-overlay" id="tradeModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="tradeTitle">Купить BTC</h3>
                <button class="modal-close" onclick="closeModal('tradeModal')">&times;</button>
            </div>
            <div class="exchange-rate" id="coinPriceDisplay">
                Цена: $0.00
            </div>
            <div class="input-group">
                <label>Сумма ($)</label>
                <input type="number" id="tradeAmount" placeholder="Введите сумму" oninput="updateTradePreview()">
            </div>
            <div class="input-group">
                <label>Вы получите</label>
                <input type="text" id="tradeResult" readonly style="background: rgba(139, 92, 246, 0.05);">
            </div>
            <button class="btn btn-primary" id="tradeBtn" onclick="executeTrade()">Купить</button>
        </div>
    </div>

    <!-- Send Modal -->
    <div class="modal-overlay" id="sendModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Отправить</h3>
                <button class="modal-close" onclick="closeModal('sendModal')">&times;</button>
            </div>
            <div class="input-group">
                <label>Логин получателя</label>
                <input type="text" id="recipientUsername" placeholder="Введите логин">
            </div>
            <div class="input-group">
                <label>Сумма (<span id="sendCurrency">$</span>)</label>
                <input type="number" id="sendAmount" placeholder="Введите сумму">
            </div>
            <button class="btn btn-primary" onclick="sendMoney()">Отправить</button>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;
        
        let currentUser = null;
        let userData = null;
        let coins = [];
        let exchangeRate = 92.50;
        let currentTradeType = 'buy';
        let currentTradeCoin = null;

        // Toast notification
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // API helpers
        async function apiGet(endpoint) {
            try {
                const response = await fetch(`${API_URL}${endpoint}`);
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return { error: 'Ошибка соединения с сервером' };
            }
        }

        async function apiPost(endpoint, data) {
            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                return { error: 'Ошибка соединения с сервером' };
            }
        }

        // Auth functions
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('loginError').classList.add('hidden');
        }

        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('regError').classList.add('hidden');
        }

        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            if (!username || !password) {
                errorDiv.textContent = 'Заполните все поля';
                errorDiv.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Вход...';

            const result = await apiPost('/api/login', { username, password });

            btn.disabled = false;
            btn.textContent = 'Войти';

            if (result.error) {
                errorDiv.textContent = result.error;
                errorDiv.classList.remove('hidden');
                return;
            }

            currentUser = username;
            userData = result.user;
            localStorage.setItem('currentUser', username);
            showWallet();
        }

        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const currency = document.getElementById('regCurrency').value;
            const errorDiv = document.getElementById('regError');
            const btn = document.getElementById('regBtn');

            if (!username || !password) {
                errorDiv.textContent = 'Заполните все поля';
                errorDiv.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Создание...';

            const result = await apiPost('/api/register', { username, password, currency });

            btn.disabled = false;
            btn.textContent = 'Создать кошелёк';

            if (result.error) {
                errorDiv.textContent = result.error;
                errorDiv.classList.remove('hidden');
                return;
            }

            currentUser = username;
            userData = result.user;
            localStorage.setItem('currentUser', username);
            showWallet();
            showToast('Кошелёк успешно создан!', 'success');
        }

        function logout() {
            currentUser = null;
            userData = null;
            localStorage.removeItem('currentUser');
            document.getElementById('authScreen').style.display = 'flex';
            document.getElementById('walletScreen').style.display = 'none';
            document.getElementById('bottomNav').classList.add('hidden');
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('loginError').classList.add('hidden');
        }

        async function showWallet() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('walletScreen').style.display = 'block';
            document.getElementById('bottomNav').classList.remove('hidden');

            document.getElementById('userName').textContent = currentUser;

            // Show/hide admin elements
            if (userData.isAdmin) {
                document.getElementById('createCoinBtn').classList.remove('hidden');
                document.getElementById('adminBadge').classList.remove('hidden');
            } else {
                document.getElementById('createCoinBtn').classList.add('hidden');
                document.getElementById('adminBadge').classList.add('hidden');
            }

            await fetchCoins();
            switchCurrency(userData.currency);
        }

        async function refreshUserData() {
            const result = await apiPost('/api/user', { username: currentUser });
            if (result.success) {
                userData = result.user;
            }
        }

        async function fetchCoins() {
            const result = await apiGet('/api/coins');
            if (result.coins) {
                coins = result.coins;
                exchangeRate = result.exchangeRate || 92.50;
                document.getElementById('currentRate').textContent = exchangeRate.toFixed(2);
            }
        }

        async function switchCurrency(currency) {
            userData.currency = currency;
            await apiPost('/api/user/currency', { username: currentUser, currency });

            document.querySelectorAll('.currency-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.currency === currency);
            });

            updateBalance();
            renderHoldings();
        }

        function updateBalance() {
            const symbol = userData.currency === 'USD' ? '$' : '₽';
            let balance = userData.currency === 'USD' ? userData.balanceUSD : userData.balanceRUB;

            // Add holdings value
            for (const ticker in userData.holdings) {
                const coin = coins.find(c => c.ticker === ticker);
                if (coin && userData.holdings[ticker] > 0) {
                    let value = userData.holdings[ticker] * coin.price;
                    if (userData.currency === 'RUB') {
                        value *= exchangeRate;
                    }
                    balance += value;
                }
            }

            document.getElementById('balanceAmount').textContent = `${symbol}${balance.toFixed(2)}`;
            document.getElementById('depositCurrency').textContent = symbol;
            document.getElementById('sendCurrency').textContent = symbol;
        }

        function renderHoldings() {
            const container = document.getElementById('myHoldings');
            container.innerHTML = '';

            // Show fiat balances
            if (userData.balanceUSD > 0) {
                container.innerHTML += `
                    <div class="crypto-item">
                        <img class="crypto-icon" src="https://flagcdn.com/w80/us.png" alt="USD">
                        <div class="crypto-info">
                            <div class="crypto-name">US Dollar</div>
                            <div class="crypto-ticker">USD</div>
                        </div>
                        <div class="crypto-price">
                            <div class="crypto-price-value">$${userData.balanceUSD.toFixed(2)}</div>
                        </div>
                    </div>
                `;
            }

            if (userData.balanceRUB > 0) {
                container.innerHTML += `
                    <div class="crypto-item">
                        <img class="crypto-icon" src="https://flagcdn.com/w80/ru.png" alt="RUB">
                        <div class="crypto-info">
                            <div class="crypto-name">Russian Ruble</div>
                            <div class="crypto-ticker">RUB</div>
                        </div>
                        <div class="crypto-price">
                            <div class="crypto-price-value">₽${userData.balanceRUB.toFixed(2)}</div>
                        </div>
                    </div>
                `;
            }

            // Show crypto holdings
            for (const ticker in userData.holdings) {
                if (userData.holdings[ticker] > 0) {
                    const coin = coins.find(c => c.ticker === ticker);
                    if (coin) {
                        const value = userData.holdings[ticker] * coin.price;
                        const symbol = userData.currency === 'USD' ? '$' : '₽';
                        const displayValue = userData.currency === 'USD' ? value : value * exchangeRate;

                        container.innerHTML += `
                            <div class="crypto-item" onclick="openTrade('sell', '${coin.ticker}')">
                                <img class="crypto-icon" src="${coin.icon}" alt="${coin.ticker}" onerror="this.src='https://via.placeholder.com/48/8b5cf6/fff?text=${coin.ticker}'">
                                <div class="crypto-info">
                                    <div class="crypto-name">${coin.name}</div>
                                    <div class="crypto-ticker">${coin.ticker}</div>
                                    <div class="holding-amount">${userData.holdings[ticker].toFixed(6)} ${ticker}</div>
                                </div>
                                <div class="crypto-price">
                                    <div class="crypto-price-value">${symbol}${displayValue.toFixed(2)}</div>
                                    <div class="crypto-change ${coin.change >= 0 ? 'positive' : 'negative'}">
                                        ${coin.change >= 0 ? '+' : ''}${coin.change.toFixed(2)}%
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                }
            }

            if (container.innerHTML === '') {
                container.innerHTML = `
                    <div class="no-coins-msg">
                        <i class="fas fa-wallet"></i>
                        <p>У вас пока нет активов</p>
                        <button class="refresh-btn" onclick="showMarketModal()">Перейти в маркет</button>
                    </div>
                `;
            }
        }

        // Modal functions
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function showDepositModal() {
            document.getElementById('depositModal').style.display = 'flex';
            document.getElementById('cardNumber').value = '';
            document.getElementById('depositAmount').value = '';
        }

        function formatCardNumber(input) {
            let value = input.value.replace(/\s/g, '').replace(/\D/g, '');
            let formatted = '';
            for (let i = 0; i < value.length && i < 16; i++) {
                if (i > 0 && i % 4 === 0) formatted += ' ';
                formatted += value[i];
            }
            input.value = formatted;
        }

        async function processDeposit() {
            const cardNumber = document.getElementById('cardNumber').value.replace(/\s/g, '');
            const amount = parseFloat(document.getElementById('depositAmount').value);

            if (cardNumber.length !== 16) {
                showToast('Введите 16 цифр номера карты', 'error');
                return;
            }

            if (!cardNumber.startsWith('2200')) {
                showToast('Карта не поддерживается', 'error');
                return;
            }

            if (!amount || amount <= 0) {
                showToast('Введите корректную сумму', 'error');
                return;
            }

            closeModal('depositModal');
            document.getElementById('processingModal').style.display = 'flex';

            setTimeout(async () => {
                const result = await apiPost('/api/deposit', {
                    username: currentUser,
                    amount: amount,
                    currency: userData.currency
                });

                closeModal('processingModal');

                if (result.error) {
                    showToast(result.error, 'error');
                    return;
                }

                userData = result.user;
                updateBalance();
                renderHoldings();
                showToast('Платёж успешно обработан!', 'success');
            }, 5000);
        }

        async function showExchangeModal() {
            await fetchCoins();
            document.getElementById('exchangeModal').style.display = 'flex';
            document.getElementById('exchangeAmount').value = '';
            document.getElementById('exchangeResult').value = '';
            document.getElementById('currentRate').textContent = exchangeRate.toFixed(2);
        }

        function updateExchangePreview() {
            const from = document.getElementById('fromCurrency').value;
            const amount = parseFloat(document.getElementById('exchangeAmount').value) || 0;

            let result;
            if (from === 'USD') {
                result = amount * exchangeRate;
                document.getElementById('exchangeResult').value = `₽${result.toFixed(2)}`;
            } else {
                result = amount / exchangeRate;
                document.getElementById('exchangeResult').value = `$${result.toFixed(2)}`;
            }
        }

        async function processExchange() {
            const from = document.getElementById('fromCurrency').value;
            const amount = parseFloat(document.getElementById('exchangeAmount').value);

            if (!amount || amount <= 0) {
                showToast('Введите корректную сумму', 'error');
                return;
            }

            const result = await apiPost('/api/exchange', {
                username: currentUser,
                from: from,
                amount: amount
            });

            if (result.error) {
                showToast(result.error, 'error');
                return;
            }

            userData = result.user;
            closeModal('exchangeModal');
            updateBalance();
            renderHoldings();
            showToast('Обмен выполнен!', 'success');
        }

        function showSendModal() {
            document.getElementById('sendModal').style.display = 'flex';
            document.getElementById('recipientUsername').value = '';
            document.getElementById('sendAmount').value = '';
        }

        async function sendMoney() {
            const recipient = document.getElementById('recipientUsername').value.trim();
            const amount = parseFloat(document.getElementById('sendAmount').value);

            if (!recipient) {
                showToast('Введите логин получателя', 'error');
                return;
            }

            if (!amount || amount <= 0) {
                showToast('Введите корректную сумму', 'error');
                return;
            }

            const result = await apiPost('/api/send', {
                username: currentUser,
                recipient: recipient,
                amount: amount,
                currency: userData.currency
            });

            if (result.error) {
                showToast(result.error, 'error');
                return;
            }

            userData = result.user;
            closeModal('sendModal');
            updateBalance();
            renderHoldings();
            showToast('Перевод выполнен!', 'success');
        }

        // Admin - Create Coin
        function showCreateCoinModal() {
            document.getElementById('createCoinModal').style.display = 'flex';
            document.getElementById('coinName').value = '';
            document.getElementById('coinTicker').value = '';
            document.getElementById('coinDescription').value = '';
            document.getElementById('coinIcon').value = '';
            document.getElementById('coinPrice').value = '';
        }

        async function createCoin() {
            const name = document.getElementById('coinName').value.trim();
            const ticker = document.getElementById('coinTicker').value.trim().toUpperCase();
            const description = document.getElementById('coinDescription').value.trim();
            const icon = document.getElementById('coinIcon').value.trim();
            const price = parseFloat(document.getElementById('coinPrice').value);

            if (!name || !ticker || !price) {
                showToast('Заполните обязательные поля', 'error');
                return;
            }

            const result = await apiPost('/api/coin/create', {
                username: currentUser,
                name,
                ticker,
                description,
                icon,
                price
            });

            if (result.error) {
                showToast(result.error, 'error');
                return;
            }

            coins.push(result.coin);
            closeModal('createCoinModal');
            showToast(`Коин ${name} (${ticker}) создан!`, 'success');
        }

        // Market
        async function showMarketModal() {
            await fetchCoins();
            document.getElementById('marketModal').style.display = 'flex';
            renderMarket();

            document.getElementById('takeAllBtn').classList.toggle('hidden', !userData.isAdmin);
        }

        function renderMarket() {
            const container = document.getElementById('marketList');

            if (coins.length === 0) {
                container.innerHTML = `
                    <div class="no-coins-msg">
                        <i class="fas fa-coins"></i>
                        <p>Пока нет доступных коинов</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = coins.map(coin => `
                <div class="market-item">
                    <img class="crypto-icon" src="${coin.icon}" alt="${coin.ticker}" onerror="this.src='https://via.placeholder.com/48/8b5cf6/fff?text=${coin.ticker}'" style="width: 40px; height: 40px; margin-right: 12px;">
                    <div class="crypto-info" style="flex: 1;">
                        <div class="crypto-name">${coin.name}</div>
                        <div class="crypto-ticker">${coin.ticker} - $${coin.price.toFixed(4)}</div>
                        <div style="font-size: 11px; color: #8b8b9e;">Кап: $${coin.capitalization.toFixed(2)}</div>
                    </div>
                    <div class="market-actions">
                        <button class="buy-btn" onclick="openTrade('buy', '${coin.ticker}')">Купить</button>
                        <button class="sell-btn" onclick="openTrade('sell', '${coin.ticker}')">Продать</button>
                    </div>
                </div>
            `).join('');
        }

        function openTrade(type, ticker) {
            currentTradeType = type;
            currentTradeCoin = coins.find(c => c.ticker === ticker);

            if (!currentTradeCoin) {
                showToast('Коин не найден', 'error');
                return;
            }

            document.getElementById('tradeTitle').textContent = type === 'buy' ? `Купить ${ticker}` : `Продать ${ticker}`;
            document.getElementById('coinPriceDisplay').textContent = `Цена: $${currentTradeCoin.price.toFixed(4)}`;
            document.getElementById('tradeAmount').value = '';
            document.getElementById('tradeResult').value = '';
            document.getElementById('tradeBtn').textContent = type === 'buy' ? 'Купить' : 'Продать';
            document.getElementById('tradeBtn').className = `btn ${type === 'buy' ? 'btn-primary' : 'btn-danger'}`;

            closeModal('marketModal');
            document.getElementById('tradeModal').style.display = 'flex';
        }

        function updateTradePreview() {
            const amount = parseFloat(document.getElementById('tradeAmount').value) || 0;

            if (currentTradeType === 'buy') {
                const coinsAmount = amount / currentTradeCoin.price;
                document.getElementById('tradeResult').value = `${coinsAmount.toFixed(6)} ${currentTradeCoin.ticker}`;
            } else {
                const holding = userData.holdings[currentTradeCoin.ticker] || 0;
                const maxValue = holding * currentTradeCoin.price;
                document.getElementById('tradeResult').value = `Макс: $${maxValue.toFixed(2)} (${holding.toFixed(6)} ${currentTradeCoin.ticker})`;
            }
        }

        async function executeTrade() {
            const amount = parseFloat(document.getElementById('tradeAmount').value);

            if (!amount || amount <= 0) {
                showToast('Введите корректную сумму', 'error');
                return;
            }

            const endpoint = currentTradeType === 'buy' ? '/api/coin/buy' : '/api/coin/sell';
            const result = await apiPost(endpoint, {
                username: currentUser,
                ticker: currentTradeCoin.ticker,
                amount: amount
            });

            if (result.error) {
                showToast(result.error, 'error');
                return;
            }

            userData = result.user;
            // Update coin in local array
            const coinIndex = coins.findIndex(c => c.ticker === currentTradeCoin.ticker);
            if (coinIndex !== -1 && result.coin) {
                coins[coinIndex] = result.coin;
            }

            closeModal('tradeModal');
            updateBalance();
            renderHoldings();
            showToast('Сделка выполнена!', 'success');
        }

        async function takeAllCapitalization() {
            if (!confirm('Вы уверены? Это заберёт всю капитализацию всех коинов!')) return;

            const result = await apiPost('/api/takeall', { username: currentUser });

            if (result.error) {
                showToast(result.error, 'error');
                return;
            }

            userData = result.user;
            await fetchCoins();
            closeModal('marketModal');
            updateBalance();
            renderHoldings();
            showToast(`Забрано: $${result.amount.toFixed(2)}`, 'success');
        }

        // Auto-refresh data
        async function autoRefresh() {
            if (currentUser) {
                await refreshUserData();
                await fetchCoins();
                updateBalance();
                renderHoldings();
            }
        }

        // Initialize
        async function init() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                const result = await apiPost('/api/user', { username: savedUser });
                if (result.success) {
                    currentUser = savedUser;
                    userData = result.user;
                    await showWallet();
                } else {
                    localStorage.removeItem('currentUser');
                }
            }

            // Auto-refresh every 10 seconds
            setInterval(autoRefresh, 10000);
        }

        init();
    </script>
</body>
</html>
